<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Promoções da Loja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Centralizar o carrossel */
        .carousel-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }
        .carousel-inner img {
            margin: auto;
        }
    </style>
</head>
<body>

    

    <!-- 1ª Digitação (Aqui) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">Loja Braba</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuLoja">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuLoja">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="#">Início</a></li>
                <li class="nav-item"><a class="nav-link text-warning" href="#">Ofertas</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Contato</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="alert alert-warning alert-dismissible fade show shadow-sm" role="alert">
        <strong>Super Mega Blaster das Galaxias Promoção!</strong> Aproveita os descontos de até 50% em toda a loja.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
    </div>

    <div class="carousel-container">
        <div id="carrosselOfertas" class="carousel slide" data-bs-ride="carousel" style="max-width: 800px; width: 100%;">
            <div class="carousel-inner rounded shadow">
                <div class="carousel-item active">
                    <img src="https://placehold.co/800x400/0d6efd/ffffff?text=Oferta+Especial" class="d-block w-100" alt="Oferta 1">
                </div>
                <div class="carousel-item">
                    <img src="https://placehold.co/800x400/198754/ffffff?text=Novos+Produtos" class="d-block w-100" alt="Oferta 2">
                </div>
                <div class="carousel-item">
                    <img src="https://placehold.co/800x400/dc3545/ffffff?text=Queima+de+Stock" class="d-block w-100" alt="Oferta 3">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carrosselOfertas" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carrosselOfertas" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>
    </div>

    <div class="card mt-5 mb-5 shadow-sm border-primary">
        <div class="card-body text-center">
            <h4 class="card-title text-primary">Desbloqueia o teu Desconto Secreto!</h4>
            <p class="card-text">Clica no botão abaixo para encher a barra. Quando chegares aos 100%, ganhas um brinde.</p>
            
            <div class="progress mb-4" style="height: 30px; font-size: 16px;">
                <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%;">0%</div>
            </div>
            
            <button id="increase-progress" class="btn btn-primary btn-lg">
                <i class="bi bi-gift"></i> Aumentar Progresso (+20%)
            </button>
        </div>
    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('increase-progress').addEventListener('click', function() {
        let progressBar = document.getElementById('progress-bar');
        let width = parseInt(progressBar.style.width);
        
        if (width < 100) {
            width += 20;
            progressBar.style.width = width + "%";
            progressBar.textContent = width + "%";

            if (width === 100) {
                alert("🎉 Parabéns! Você desbloqueou um desconto especial!");
            }
        }
    });
</script>

</body>
</html>
