<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Bootstrap Customizado</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- CSS customizado -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="w-100 h-100 d-flex flex-column justify-content-center align-items-center">

    
    <!-- 1ª Digitação (Aqui) -->
     <div class="container mt-3">
         <form action="" class="custom-form p-2 rounded-2 d-flex flex-column gap-3">


            <div class="input-group">
                <label for="emailInput" class="rounded-start p-3 bg-light"><i class="bi-envelope"></i></label>
                <input class="form-control" type="email" name="" id="emailInput" placeholder="Email">
            </div>

            <div class="input-group">
                <label class="bg-light rounded-start p-3" for="userInput"><i class="bi-people"></i></label>
                <input class="form-control" type="text" id="userInput" placeholder="Username">
            </div>

            <div class="input-group">
                <label class="rounded-start p-3 bg-light" for="passwordInput"><i class="bi-fingerprint"></i></label>
                <input class="form-control" type="password" name="" id="passwordInput" placeholder="Senha">
            </div>

            <button class="btn btn-success w-25 align-self-center">Enviar</button>
            <a href="">Novo por aqui safadinho?</a>
         </form> 
     </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
