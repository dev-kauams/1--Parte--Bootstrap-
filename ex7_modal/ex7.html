<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>


    <!-- 1ª Digitação (Aqui) -->


    <div class="container mt-5">
        <h2>Exercício de Modal Bootstrap</h2>
        <p>Clica no botão abaixo para abrir a janela de diálogo.</p>

        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#meuModalExemplo">
            Abrir Modal Interativo
        </button>

        <div class="modal fade" id="meuModalExemplo" tabindex="-1" aria-labelledby="tituloModal" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    
                    <div class="modal-header">
                        <h5 class="modal-title" id="tituloModal">Confirmação de Ação</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>

                    <div class="modal-body">
                        <p>Este é o corpo do modal. Aqui podes colocar textos, formulários ou imagens.</p>
                        <div class="alert alert-info">
                            Top esse modal hein professor.<br><code>modal-lg</code> ou <code>modal-sm</code> no <code>modal-dialog</code>.
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                        <button type="button" class="btn btn-success">Guardar Alterações</button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
