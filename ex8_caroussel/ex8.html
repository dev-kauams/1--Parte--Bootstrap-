<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>


    <!-- 1ª Digitação (Aqui) -->
    <div class="container mt-5">
        <h2 class="text-center mb-4">Apresentação de Slides (Carousel)</h2>

        <div id="meuCarouselExemplo" class="carousel slide" data-bs-ride="carousel">
            
            <div class="carousel-inner shadow-lg rounded">
                <div class="carousel-item active">
                    <img src="https://mcdn.wallpapersafari.com/medium/2/29/fdr5Z7.jpg" class="d-block w-100" alt="Slide Azul">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Destaque Principal</h5>
                        <p>Esta é a descrição do nosso primeiro slide.</p>
                    </div>
                </div>

                <div class="carousel-item">
                    <img src="https://mcdn.wallpapersafari.com/medium/34/82/kEPMa2.jpg" class="d-block w-100" alt="Slide Cinzento">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Segunda Oferta</h5>
                        <p>Podes personalizar as cores e textos facilmente.</p>
                    </div>
                </div>

                <div class="carousel-item">
                    <img src="https://mcdn.wallpapersafari.com/medium/6/34/dL3OIb.jpg" class="d-block w-100" alt="Slide Verde">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Sucesso Garantido</h5>
                        <p>O Bootstrap trata da animação por ti.</p>
                    </div>
                </div>
            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#meuCarouselExemplo" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Anterior</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#meuCarouselExemplo" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Próximo</span>
            </button>
        </div>
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
