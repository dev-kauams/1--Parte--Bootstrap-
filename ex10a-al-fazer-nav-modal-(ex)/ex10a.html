<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    

    <!-- 1ª Digitação (Aqui) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Meu Portfólio</a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavegacao">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="menuNavegacao">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalContato">
                        Contato
                    </button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="modal fade" id="modalContato" tabindex="-1" aria-labelledby="tituloModal" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            
            <div class="modal-header bg-light">
                <h5 class="modal-title" id="tituloModal">Envie-nos uma Mensagem</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            
            <form class="needs-validation" novalidate>
                <div class="modal-body">
                    
                    <div class="mb-3">
                        <label for="nomeContato" class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" id="nomeContato" required>
                        <div class="invalid-feedback">
                            Por favor, insere o teu nome.
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="emailContato" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="emailContato" required>
                        <div class="invalid-feedback">
                            Por favor, insere um endereço de e-mail válido.
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="mensagemContato" class="form-label">Mensagem</label>
                        <textarea class="form-control" id="mensagemContato" rows="4" required></textarea>
                        <div class="invalid-feedback">
                            A tua mensagem não pode estar vazia.
                        </div>
                    </div>
                    
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Enviar Mensagem</button>
                </div>
            </form>

        </div>
    </div>
</div>

<script>
    (function () {
        'use strict'
        var forms = document.querySelectorAll('.needs-validation')
        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            }, false)
        })
    })()
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
