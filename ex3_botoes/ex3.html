<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botões Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>
<body class="d-flex justify-content-center mt-5 gap-5">
    <button class="btn btn-primary"><i class="bi-search"></i>Procurar</button>
    <button class="btn btn-danger"><i class="bi-trash"></i>Excluir</button>
    <button class="btn btn-outline-secondary"><i class="bi-people"></i>Conversar</button>

    <!-- 1ª Digitação (Aqui) -->
     

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
