<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts e Progress Bar Bootstrap Interativos</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-3 d-flex flex-column align-items-center">

        <!-- ================================
             BOTÕES DE CONTROLE DOS ALERTS
             ================================ -->
          <div class="mb-4">
               <button class="btn btn-success me-2" onclick="mostrarSucesso()">Mostrar Alerta de Sucesso</button>
               <button class="btn btn-danger" onclick="mostrarErro()">Mostrar Alerta de Erro</button>
          </div>


        <!-- 1ª Digitação (Aqui) -->

        <!-- ================================
             ALERT DE SUCESSO
             Começa sem a classe "show", ou seja, invisível.
             O JS adiciona "show" ao clicar no botão.
             ================================ -->
          <div class="alert alert-success alert-dismissible fade" id="successAlert" role="alert">
               <strong>Sucesso!</strong> A tua operação foi concluída com êxito!
               <button type="button" class="btn-close" onclick="fecharAlert('successAlert')"></button>
          </div>


        <!-- 2ª Digitação (Aqui) -->



        <!-- ================================
             ALERT DE ERRO
             Mesmo comportamento do alert de sucesso.
             ================================ -->
        <div class="alert alert-danger alert-dismissible fade" id="errorAlert">
            <strong>Erro!</strong> Erro ao processar a operação!
            <button type="button" class="btn-close" onclick="fecharAlert('errorAlert')"></button>
        </div>

        <!-- ================================
             TOAST (NOTIFICAÇÃO FLUTUANTE)
             Posicionado no canto superior direito via Bootstrap.
             O JS usa a classe Bootstrap Toast para exibir/ocultar.
             ================================ -->

        <button class="btn btn-info text-white mb-4" onclick="mostrarToast()">Mostrar Notificação Flutuante (Toast)</button>

        <div class="toast-container position-fixed top-0 end-0 p-3">
            <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
                <div class="toast-header bg-info text-white">
                    <strong class="me-auto"><i class="bi bi-bell-fill"></i> Aviso do Sistema</strong>
                    <small>Agora mesmo</small>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
                <div class="toast-body">
                    Esta é a tua notificação flutuante personalizada!
                </div>
            </div>
        </div>

        <!-- 3ª Digitação (Aqui) -->




        <!-- ================================
             BARRA DE PROGRESSO
             Começa em 0%. O JS atualiza o width e o texto.
             A animação shimmer é ativada/desativada pelo JS
             adicionando/removendo a classe "barra-shimmer".
             ================================ -->
        <h5 class="mt-4">Progresso:</h5>
        <div class="progress mb-3 w-100">
            <div class="progress-bar"
                 id="dynamicProgress"
                 role="progressbar"
                 style="width: 0%;">
                0%
            </div>
        </div>

        <!-- ================================
             CONTROLES DA BARRA DE PROGRESSO
             Botões para aumentar/diminuir e ligar/desligar a animação.
             ================================ -->
        <div class="d-flex gap-2 mb-5">
            <button class="btn btn-outline-primary" onclick="updateProgress(-10)">
                <i class="bi bi-dash"></i> Menos 10%
            </button>
            <button class="btn btn-outline-primary" onclick="updateProgress(10)">
                <i class="bi bi-plus"></i> Mais 10%
            </button>
            <button id="toggleAnimationBtn" class="btn btn-success ms-3" onclick="toggleAnimacao()">
                Ligar Animação
            </button>
        </div>



        <!-- 4ª Digitação (Aqui) -->

        


    </div>

    <!-- Bootstrap JS (necessário para o componente Toast funcionar) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script personalizado (deve vir depois do Bootstrap JS) -->
    <script src="teste.js"></script>
</body>
</html>
